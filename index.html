<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Para ti 💗</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background: #050505;
            overflow: hidden;
            color: white;
            font-family: "Cormorant Garamond", serif;

        }

        .scene {

            position: absolute;
            inset: 0;

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

            transition: all .9s ease;

        }

        .hidden {

            opacity: 0;
            pointer-events: none;
            transform: scale(.95);

        }

        /* ===== DESTELLOS ===== */

        .stars {

            position: fixed;
            inset: 0;
            overflow: hidden;

        }

        .star {

            position: absolute;
            width: 2px;
            height: 2px;

            background: rgba(255,255,255,.9);

            border-radius: 50%;

            animation: twinkle infinite ease-in-out;

        }

        @keyframes twinkle {

            0%,100% {

                opacity: .2;
                transform: scale(1);

            }

            50% {

                opacity: 1;
                transform: scale(2);

            }

        }

        /* ===== SOBRE ===== */

        .envelope {

            position: relative;

            width: 420px;
            height: 280px;

        }

        .envelope-body {

            position: absolute;

            width: 100%;
            height: 100%;

            background: #111;

            border-radius: 10px;

            box-shadow: 0 0 50px rgba(255, 192, 203, .1);

        }

        .flap {

            position: absolute;

            width: 100%;
            height: 100%;

            background: #1b1b1b;

            clip-path: polygon(0 0, 50% 55%, 100% 0);

            transform-origin: top;

            transition: transform 1s ease;

        }

        .seal {

            position: absolute;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);

            font-size: 58px;

            cursor: pointer;

            transition: .3s;

            z-index: 5;

        }

        .seal:hover {

            transform: translate(-50%, -50%) scale(1.15);

        }

        .message {

            margin-top: 40px;

            color: #e9b7c7;

            font-size: 26px;

        }

        /* ===== CARTA ===== */

        .letter-container {

            width: 700px;
            max-width: 90%;

            background: #f5ece6;

            border-radius: 18px;

            padding: 55px;

            box-shadow: 0 0 50px rgba(255,255,255,.05);

            color: #403a3a;

        }

        .letter-container h1 {

            text-align: center;

            font-family: "Great Vibes", cursive;

            color: #b26c86;

            font-size: 62px;

            margin-bottom: 30px;

        }

        .letter-container p {

            font-size: 28px;

            line-height: 1.8;

            text-align: center;

        }

        .music-button {

            margin-top: 35px;

            border: none;

            background: transparent;

            color: #b26c86;

            font-size: 26px;

            cursor: pointer;

            transition: .3s;

        }

        .music-button:hover {

            transform: scale(1.08);

        }

        /* ===== CASSETTE ===== */

        .cassette-container {

            display: flex;

            flex-direction: column;

            align-items: center;

            gap: 20px;

        }

        .cassette-container img {

            width: 430px;
            max-width: 90%;

            filter: drop-shadow(0 0 25px rgba(255,192,203,.2));

        }

        .song-title {

            font-size: 48px;

            color: #e7b4c8;

            font-family: "Great Vibes", cursive;

        }

        .song-subtitle {

            font-size: 24px;

            color: #d5c2cb;

        }

        .controls {

            display: flex;

            gap: 20px;

            margin-top: 15px;

        }

        .controls button {

            width: 70px;
            height: 70px;

            border-radius: 50%;

            border: none;

            background: #e7b4c8;

            color: #111;

            font-size: 24px;

            cursor: pointer;

            transition: .3s;

        }

        .controls button:hover {

            transform: scale(1.1);

        }

        .back-button {

            margin-top: 20px;

            border: 1px solid #e7b4c8;

            background: transparent;

            color: #e7b4c8;

            padding: 12px 24px;

            border-radius: 50px;

            cursor: pointer;

        }

        @media (max-width: 700px) {

            .envelope {

                width: 300px;
                height: 200px;

            }

            .letter-container {

                padding: 35px;

            }

            .letter-container p {

                font-size: 22px;

            }

        }

    </style>

</head>

<body>

    <div class="stars" id="stars"></div>

    <!-- SOBRE -->

    <section class="scene" id="envelopeScene">

        <div class="envelope">

            <div class="envelope-body"></div>

            <div class="flap" id="flap"></div>

            <div class="seal" id="openEnvelope">

                💗

            </div>

        </div>

        <div class="message">

            Toca el corazón para abrir

        </div>

    </section>

    <!-- CARTA -->

    <section class="scene hidden" id="letterScene">

        <div class="letter-container">

            <h1>Para ti</h1>

            <p>

                TU CARTA AQUÍ.

                Puedes escribir todo lo que sientes, lo que has vivido con esa persona y lo importante que se ha vuelto para ti.

            </p>

            <button class="music-button" id="goMusic">

                🎵 Escuchar nuestra canción

            </button>

        </div>

    </section>

    <!-- MÚSICA -->

    <section class="scene hidden" id="musicScene">

        <div class="cassette-container">

            <h2 class="song-title">

                Nuestra canción

            </h2>

            <img src="cassette.png">

            <p class="song-subtitle">

                Si supieras · Kevin Kaarl

            </p>

            <audio id="audio">

                <source src="cancion.mp3" type="audio/mpeg">

            </audio>

            <div class="controls">

                <button id="play">

                    ▶

                </button>

                <button id="pause">

                    ❚❚

                </button>

            </div>

            <button class="back-button" id="back">

                ← Volver a la carta

            </button>

        </div>

    </section>

    <script>

        const stars = document.getElementById("stars");

        for(let i = 0; i < 90; i++) {

            const star = document.createElement("div");

            star.classList.add("star");

            star.style.left = Math.random() * 100 + "%";

            star.style.top = Math.random() * 100 + "%";

            star.style.animationDuration = (2 + Math.random() * 5) + "s";

            star.style.width = (1 + Math.random() * 3) + "px";

            star.style.height = star.style.width;

            stars.appendChild(star);

        }

        const envelopeScene = document.getElementById("envelopeScene");

        const letterScene = document.getElementById("letterScene");

        const musicScene = document.getElementById("musicScene");

        const flap = document.getElementById("flap");

        document.getElementById("openEnvelope").onclick = () => {

            flap.style.transform = "rotateX(180deg)";

            setTimeout(() => {

                envelopeScene.classList.add("hidden");

                letterScene.classList.remove("hidden");

            }, 1000);

        };

        document.getElementById("goMusic").onclick = () => {

            letterScene.classList.add("hidden");

            musicScene.classList.remove("hidden");

        };

        const audio = document.getElementById("audio");

        document.getElementById("play").onclick = () => {

            audio.play();

        };

        document.getElementById("pause").onclick = () => {

            audio.pause();

        };

        document.getElementById("back").onclick = () => {

            musicScene.classList.add("hidden");

            letterScene.classList.remove("hidden");

            audio.pause();

        };

    </script>

</body>

</html>
